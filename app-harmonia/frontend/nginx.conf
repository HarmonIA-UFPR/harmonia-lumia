server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # Cache para assets versionados gerados pelo Angular.
  location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: qualquer rota Angular deve cair no index.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy opcional para o backend FastAPI (harmonia-app).
  # Exemplo de uso no frontend: apiUrl = "/api"
  location /api/ {
    proxy_pass http://harmonia-app:50052/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy opcional para a API do agente.
  # Exemplo de uso no frontend: apiAgentUrl = "/agent"
  location /agent/ {
    proxy_pass http://harmonia-agente:50053/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
