<div class="min-h-screen bg-gray-100 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center flex-col items-center">
      <div class="w-16 h-16 rounded-xl flex items-center justify-center text-white text-3xl font-bold mb-4" aria-hidden="true">
        <img src="images/logo-bg-branco.jpg" alt="">
      </div>
      <h2 class="text-center text-3xl font-extrabold text-gray-900 tracking-tight">
        Entre na sua conta
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Ou
        <a routerLink="/" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">
          volte para o portal inicial
        </a>
      </p>
    </div>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">

      @if (errorMessage()) {
        <div class="mb-5 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-md text-sm font-medium animate-fade-in-up" role="alert">
          {{ errorMessage() }}
        </div>
      }

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">
            Endereço de e-mail
          </label>
          <div class="mt-1">
            <input id="email" placeholder="exemplo@email.com" type="email" formControlName="email" autocomplete="email" required
              class="appearance-none block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Senha
          </label>
          <div class="mt-1">
            <input id="password" type="password" formControlName="password" autocomplete="current-password" required
              class="appearance-none block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
          </div>
        </div>

        <div class="flex items-center justify-between pt-2 gap-4">
          <button type="button" routerLink="/"
            class="w-full flex justify-center py-2.5 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-semibold text-gray-700 bg-white hover:cursor-pointer hover:underline hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
            Voltar
          </button>

          <button type="submit" [disabled]="loginForm.invalid || isLoading()"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-[#2b4699] hover:bg-[#2b4699] hover:cursor-pointer hover:underline focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-60 disabled:cursor-not-allowed transition-all">
            @if (isLoading()) {
              <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Verificando...
            } @else {
              Entrar
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
