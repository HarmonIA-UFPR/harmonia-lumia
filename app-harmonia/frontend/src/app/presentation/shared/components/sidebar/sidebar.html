<div class="w-90 h-screen bg-[#2b4699] text-gray-100 flex flex-col pt-4 relative border-r border-gray-800">
  <div class="px-4 mb-6 font-bold text-2xl tracking-wide flex items-center gap-2">
      <img class="w-50" src="images/texto-bg-azul.jpg" alt="">
  </div>

  <nav class="flex-1 overflow-y-auto px-3 space-y-1" aria-label="Lista de chats">
    <div class="text-xs font-semibold text-white-500 uppercase tracking-wider mb-3 px-1">Seus Chats</div>
    @for (chat of chats(); track chat.chatUuid7; let idx = $index) {
      @if (idx < 10) {
        <button
          (click)="selectChat(chat.chatUuid7)"
          [attr.aria-current]="selectedChatUuid() === chat.chatUuid7 ? 'true' : null"
          class="w-full bg-gray-700 text-grey-400 text-left px-3 py-2.5 rounded-lg text-sm truncate transition-colors {{ selectedChatUuid() === chat.chatUuid7 ? 'bg-gray-800 font-medium' : '' }}">
          <span class="block font-semibold text-white truncate">{{ chat.title }}</span>
          <span class="block text-[10px] text-gray-300 truncate mt-0.5">{{ chat.chatUuid7 }}</span>
        </button>
      }
    }
  </nav>

  <div class="p-4 border-t border-gray-800">
    <div class="relative">
      @if (isMenuOpen()) {
        <div class="absolute bottom-full left-0 w-full mb-2 bg-gray-800 border border-gray-700 rounded-lg shadow-xl overflow-hidden py-1 z-50 animate-fade-in-up" role="menu">
          <button (click)="newChat()" role="menuitem" class="w-full text-left px-4 py-2 text-sm text-gray-200 hover:bg-gray-700 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Novo Chat
          </button>
          <div class="border-t border-gray-700 my-1"></div>
          <button (click)="logout()" role="menuitem" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-gray-700 hover:text-red-300 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
          </button>
        </div>
      }

      <button (click)="toggleMenu()" aria-label="Abrir menu de opções" [attr.aria-expanded]="isMenuOpen()" class="w-full flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gray-800 transition-colors">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-xs uppercase shadow-inner" aria-hidden="true">
            {{ userInitial() }}
          </div>
          <span class="text-sm font-medium">{{ firstName() || 'Opções' }}</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 {{ isMenuOpen() ? 'rotate-180 transition-transform' : 'transition-transform' }}" aria-hidden="true"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </button>
    </div>
  </div>
</div>
