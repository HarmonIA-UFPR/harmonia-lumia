# ======================================================================
#  ESTRUTURA DOCKER COMPOSE
# ======================================================================
# PORTAS:
# 55030:50032 - Backend / app-harmonia
# 55031:55031 - PostgreSQL 18 / app-harmonia
# 55032:55032 - PostgreSQL 18 / app-agente
# 55033:55030 - Backend / app-agente

# 55038:8080  - Weavite / 
# 55039:50051 - Weavite / 

services:
      
  # ======================
  #  Weaviate (Banco vetorial)
  # ======================
  harmonia-weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.2
    container_name: harmonia-weaviate
    ports:
      - "55038:8080"
      - "55039:50051"
    volumes:
      - harmonia-weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
      ENABLE_MODULES: 'none'
      restart: on-failure
    networks:
      - harmonia-network


  # ======================
  #  POSTGRESQL (Banco relacional)
  # ======================
  harmonia-pg18-backend:
    image: postgres:18.3-alpine3.23
    container_name: harmonia-pg18-backend
    shm_size: 256mb
    restart: no
    environment:
      PGPORT: 5400
      POSTGRES_USER: harmonia
      POSTGRES_PASSWORD: "harmonia2025"
      POSTGRES_DB: harmonia
      POSTGRES_INITDB_ARGS: "--locale=pt_BR.UTF-8 --encoding=UTF8"
      LANG: pt_BR.utf8
    command: ["postgres", "-p", "5400"]
    ports:
      - "55031:5400"
    volumes:
      - harmonia-pg18-backend:/var/lib/postgresql
      - ./database/scripts-backend:/docker-entrypoint-initdb.d
    networks:
      - harmonia-network

  harmonia-pg18-agente:
    image: postgres:18.3-alpine3.23
    container_name: harmonia-pg18-agente
    shm_size: 256mb
    restart: no
    environment:
      PGPORT: 5401
      POSTGRES_USER: harmonia
      POSTGRES_PASSWORD: "harmonia2025"
      POSTGRES_DB: harmonia
    command: ["postgres", "-p", "5401"]
    ports:
      - "55032:5401"
    volumes:
      - harmonia-pg18-agente:/var/lib/postgresql
      - ./database/scripts-agente:/docker-entrypoint-initdb.d
    networks:
      - harmonia-network

  harmonia-app:
    image: harmonia-app:v0.1
    build:
      context: ./app-harmonia/backend
      dockerfile: Dockerfile
    container_name: harmonia-app
    volumes:
      - ./app-harmonia/backend/:/app
    ports:
      - "55030:50052"
    stdin_open: true
    tty: true
    env_file:
    - ./config/.env-harmonia-app
    networks:
        - harmonia-network

  harmonia-agente:
    image: harmonia-agente:v0.1
    build:
      context: ./app-agente
      dockerfile: src/agente_chat/Dockerfile
    container_name: harmonia-agente
    volumes:
      - ./app-agente:/app
      - ./modelos:/app/modelos
    ports:
      - "55036:50053"
    stdin_open: true
    tty: true
    env_file:
      - ./config/.env-harmonia-agente
    networks:
      - harmonia-network


# ======================
#  VOLUMES
# ======================
volumes:
  harmonia-pg18-backend:
    name: harmonia-pg18-backend
    driver: local
  harmonia-pg18-agente:
    name: harmonia-pg18-agente
    driver: local
  harmonia-weaviate_data:
    name: harmonia-weaviate_data
    driver: local

# ======================
#  REDE INTERNA
# ======================
networks:
  harmonia-network:
    name: harmonia-network
    external: false 
